name: Cleanup merged claude branches

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete merged claude branches
        run: |
          git fetch --prune
          for branch in $(git branch -r --merged origin/main | grep 'origin/claude/' | sed 's|origin/||'); do
            echo "Deleting merged branch: $branch"
            git push origin --delete "$branch" || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
